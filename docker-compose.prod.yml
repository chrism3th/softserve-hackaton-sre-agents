# Production-like override: built images, resource limits, no source mounts.
# Combine with the base file:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d

services:
  migrate:
    image: hackaton/backend:${TAG:-latest}

  db:
    deploy:
      resources:
        limits:
          memory: 512M

  redis:
    deploy:
      resources:
        limits:
          memory: 256M

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: hackaton/backend:${TAG:-latest}
    environment:
      ENV: prod
      LOG_LEVEL: INFO
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.0"

