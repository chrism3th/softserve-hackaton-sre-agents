# Base compose file: shared service topology for dev and prod.
# Do not run this file alone — always pair with one of:
#   docker-compose.dev.yml  (hot-reload, source mounts, debug)
#   docker-compose.prod.yml (built images, resource limits, no mounts)
#
# Usage:
#   make up             # dev
#   make up-prod        # prod-like
#
name: hackaton

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-app}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-app}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks: [backend_net]
    restart: unless-stopped

  phoenix:
    image: arizephoenix/phoenix:latest
    environment:
      PHOENIX_WORKING_DIR: /mnt/data
    volumes:
      - phoenix_data:/mnt/data
    ports:
      - "6006:6006"   # UI + OTLP HTTP
      - "4317:4317"   # OTLP gRPC
    networks: [backend_net]
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks: [backend_net]
    restart: unless-stopped

  migrate:
    # One-shot service: applies pending Alembic migrations then exits.
    # backend depends on this completing successfully before it starts.
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: alembic upgrade head
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-app}
    depends_on:
      db:
        condition: service_healthy
    networks: [backend_net]
    restart: "no"

  backend:
    environment:
      ENV: ${ENV:-dev}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-app}
      REDIS_URL: redis://redis:6379/0
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      LLM_MODEL: ${LLM_MODEL:-claude-sonnet-4-6}
      LINEAR_API_KEY: ${LINEAR_API_KEY:-}
      LINEAR_TEAM_KEY: ${LINEAR_TEAM_KEY:-TEA}
      LINEAR_WEBHOOK_SECRET: ${LINEAR_WEBHOOK_SECRET:-}
      GITHUB_WEBHOOK_SECRET: ${GITHUB_WEBHOOK_SECRET:-}
      GITHUB_API_TOKEN: ${GITHUB_API_TOKEN:-}
      GITHUB_API_URL: ${GITHUB_API_URL:-https://api.github.com}
      GITHUB_REPO: ${GITHUB_REPO:-}
      PHOENIX_COLLECTOR_ENDPOINT: ${PHOENIX_COLLECTOR_ENDPOINT:-http://phoenix:6006}
      PHOENIX_PROJECT_NAME: ${PHOENIX_PROJECT_NAME:-sre-agents}
      CORS_ORIGINS: '["http://localhost:5173","http://localhost:8080"]'
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      EMAIL_FROM: ${EMAIL_FROM:-onboarding@resend.dev}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    networks: [backend_net, frontend_net]
    restart: unless-stopped

  frontend:
    depends_on:
      - backend
    networks: [frontend_net]
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  phoenix_data:

networks:
  backend_net:
    driver: bridge
  frontend_net:
    driver: bridge
