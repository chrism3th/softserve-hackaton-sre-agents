# Development override: hot-reload, source mounts, debug tools exposed.
# Combine with the base file:
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml up

services:
  db:
    ports:
      - "5432:5432"

  redis:
    ports:
      - "6379:6379"

  migrate:
    build:
      dockerfile: Dockerfile.dev
    volumes:
      - ./backend/src:/app/src
      - ./backend/alembic:/app/alembic
      - ./backend/alembic.ini:/app/alembic.ini
      - ./backend/pyproject.toml:/app/pyproject.toml
      - ./backend/uv.lock:/app/uv.lock

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    volumes:
      - ./backend/src:/app/src
      - ./backend/tests:/app/tests
      - ./backend/pyproject.toml:/app/pyproject.toml
      - ./backend/uv.lock:/app/uv.lock
      - ./backend/alembic:/app/alembic
      - ./backend/alembic.ini:/app/alembic.ini
    ports:
      - "8000:8000"
    environment:
      ENV: dev
      LOG_LEVEL: DEBUG

